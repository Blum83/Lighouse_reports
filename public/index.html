<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse Runner</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    header { margin-bottom: 32px; }
    header h1 { font-size: 1.6rem; font-weight: 700; color: #1a1a1a; }
    header p { font-size: 0.9rem; color: #666; margin-top: 4px; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      padding: 24px;
      margin-bottom: 24px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .input-group { flex: 1; min-width: 240px; }
    .input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: #1a73e8; }

    select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      background: #fff;
      cursor: pointer;
      height: 42px;
    }
    select:focus { border-color: #1a73e8; }

    .device-toggle {
      display: flex;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      height: 42px;
    }
    .device-toggle input { display: none; }
    .device-toggle label {
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      color: #666;
      transition: background .15s, color .15s;
      user-select: none;
    }
    .device-toggle input:checked + label {
      background: #1a73e8;
      color: #fff;
    }

    .btn-run {
      padding: 0 28px;
      height: 42px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      white-space: nowrap;
    }
    .btn-run:hover { background: #1557b0; }
    .btn-run:disabled { opacity: .5; cursor: not-allowed; }

    /* Progress */
    .progress-wrap { display: none; }
    .progress-wrap.visible { display: block; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.88rem;
      color: #555;
    }
    .progress-bar-bg {
      height: 6px;
      background: #e8eaed;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #1a73e8;
      border-radius: 99px;
      width: 0%;
      transition: width .4s ease;
    }

    /* Error */
    .error-msg {
      display: none;
      padding: 12px 16px;
      background: #fce8e6;
      color: #c5221f;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
    .error-msg.visible { display: block; }

    /* Table */
    .results-wrap { display: none; }
    .results-wrap.visible { display: block; }

    .results-meta {
      font-size: 0.82rem;
      color: #666;
      margin-bottom: 14px;
    }
    .results-meta strong { color: #1a73e8; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    thead { background: #1a73e8; color: #fff; }
    thead th {
      padding: 11px 14px;
      text-align: center;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: .04em;
    }
    tbody tr { transition: background .15s; }
    tbody tr:hover { background: #f0f7ff; }
    tbody td {
      padding: 9px 14px;
      text-align: center;
      border-bottom: 1px solid #eee;
      color: #444;
    }
    td.run-num { color: #aaa; font-size: 0.8rem; }
    td.score-cell { font-weight: 700; font-size: 1rem; }

    tr.avg-row { background: #e8f0fe !important; }
    tr.avg-row td { font-weight: 700; border-bottom: none; }
    tr.avg-row .avg-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .06em; color: #555; }

    .legend {
      margin-top: 14px;
      font-size: 0.78rem;
      color: #777;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* Export */
    .export-row {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #eee;
      flex-wrap: wrap;
    }
    .export-row.visible { display: flex; }
    .export-label { font-size: 0.8rem; color: #888; margin-right: 4px; }
    .btn-export {
      padding: 6px 16px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s;
      color: #444;
    }
    .btn-export:hover { border-color: #1a73e8; color: #1a73e8; background: #f0f7ff; }

    tr.new-row td { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Lighthouse Runner</h1>
      <p>Run performance audits and get averaged results</p>
    </header>

    <div class="card">
      <div class="form-row">
        <div class="input-group">
          <label>URL</label>
          <input type="text" id="urlInput" placeholder="https://example.com" />
        </div>
        <div class="input-group" style="flex:0">
          <label>Device</label>
          <div class="device-toggle">
            <input type="radio" name="device" id="devMobile" value="mobile" checked />
            <label for="devMobile">📱 Mobile</label>
            <input type="radio" name="device" id="devDesktop" value="desktop" />
            <label for="devDesktop">🖥 Desktop</label>
          </div>
        </div>
        <div class="input-group" style="flex:0">
          <label>Runs</label>
          <select id="runsSelect">
            <option value="1">1</option>
            <option value="3">3</option>
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="15">15</option>
            <option value="20">20</option>
            <option value="50">50</option>
          </select>
        </div>
        <button class="btn-run" id="runBtn" onclick="startRun()">Run</button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="card progress-wrap" id="progressWrap">
      <div class="progress-header">
        <span id="progressLabel">Preparing...</span>
        <span id="progressCount"></span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="card results-wrap" id="resultsWrap">
      <p class="results-meta" id="resultsMeta"></p>
      <table>
        <thead>
          <tr>
            <th>Run</th>
            <th>Score</th>
            <th>FCP</th>
            <th>LCP</th>
            <th>TBT</th>
            <th>CLS</th>
            <th>Speed Index</th>
            <th>TTI</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#0cce6b"></div>Good (90–100)</div>
        <div class="legend-item"><div class="dot" style="background:#ffa400"></div>Needs Improvement (50–89)</div>
        <div class="legend-item"><div class="dot" style="background:#ff4e42"></div>Poor (0–49)</div>
      </div>
      <div class="export-row" id="exportRow">
        <span class="export-label">Export:</span>
        <button class="btn-export" onclick="exportHtml()">HTML</button>
        <button class="btn-export" onclick="exportCsv()">CSV</button>
        <button class="btn-export" onclick="exportXlsx()">XLSX</button>
      </div>
    </div>
  </div>

  <script>
    let resultsData = [];
    let avgData = null;
    let currentUrl = '';
    let currentDevice = 'mobile';

    function scoreColor(score) {
      if (score >= 90) return '#0cce6b';
      if (score >= 50) return '#ffa400';
      return '#ff4e42';
    }

    function fmt(val) { return val ?? '—'; }

    function makeRow(runNum, r, isAvg = false) {
      const tr = document.createElement('tr');
      if (isAvg) tr.className = 'avg-row';
      else tr.className = 'new-row';

      const label = isAvg
        ? `<td class="avg-label">Avg</td>`
        : `<td class="run-num">${runNum}</td>`;

      tr.innerHTML = `
        ${label}
        <td class="score-cell" style="color:${scoreColor(r.score)}">${r.score}</td>
        <td>${fmt(r.fcpFmt)}</td>
        <td>${fmt(r.lcpFmt)}</td>
        <td>${fmt(r.tbtFmt)}</td>
        <td>${fmt(r.clsFmt)}</td>
        <td>${fmt(r.siFmt)}</td>
        <td>${fmt(r.ttiFmt)}</td>
      `;
      return tr;
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    // ── Export helpers ────────────────────────────────────────────────

    function getFilename(ext) {
      try {
        const domain = new URL(currentUrl).hostname.replace(/^www\./, '');
        const ts = new Date().toISOString().slice(0, 16).replace('T', '_').replace(':', '-');
        return `${domain}_${currentDevice}_${ts}.${ext}`;
      } catch {
        return `lighthouse_${currentDevice}.${ext}`;
      }
    }

    function getTableRows() {
      const headers = ['Run', 'Score', 'FCP', 'LCP', 'TBT', 'CLS', 'Speed Index', 'TTI'];
      const rows = resultsData.map((r, i) => [
        i + 1, r.score,
        r.fcpFmt ?? '', r.lcpFmt ?? '', r.tbtFmt ?? '',
        r.clsFmt ?? '', r.siFmt ?? '', r.ttiFmt ?? '',
      ]);
      if (avgData) rows.push([
        'Avg', avgData.score,
        avgData.fcpFmt ?? '', avgData.lcpFmt ?? '', avgData.tbtFmt ?? '',
        avgData.clsFmt ?? '', avgData.siFmt ?? '', avgData.ttiFmt ?? '',
      ]);
      return { headers, rows };
    }

    function downloadBlob(content, mimeType, filename) {
      const blob = new Blob([content], { type: mimeType });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function exportCsv() {
      const { headers, rows } = getTableRows();
      const escape = v => `"${String(v).replace(/"/g, '""')}"`;
      const csv = [headers, ...rows].map(row => row.map(escape).join(',')).join('\r\n');
      downloadBlob(csv, 'text/csv;charset=utf-8;', getFilename('csv'));
    }

    function exportHtml() {
      const { headers, rows } = getTableRows();
      const deviceLabel = currentDevice === 'mobile' ? '📱 Mobile' : '🖥 Desktop';
      const thHtml = headers.map(h => `<th>${h}</th>`).join('');
      const tbodyHtml = rows.map((row, i) => {
        const isAvg = i === rows.length - 1 && avgData;
        const cells = row.map((v, ci) => {
          if (ci === 1) {
            const color = scoreColor(Number(v));
            return `<td style="font-weight:700;color:${color}">${v}</td>`;
          }
          return `<td>${v}</td>`;
        }).join('');
        return isAvg
          ? `<tr style="background:#e8f0fe;font-weight:700">${cells}</tr>`
          : `<tr>${cells}</tr>`;
      }).join('');

      const html = `<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<title>Lighthouse — ${currentUrl}</title>
<style>
  body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;padding:32px;color:#333}
  h1{font-size:1.3rem;margin-bottom:4px}
  .meta{font-size:.82rem;color:#666;margin-bottom:20px}
  table{border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.12);width:100%}
  thead{background:#1a73e8;color:#fff}
  th,td{padding:10px 14px;text-align:center;font-size:.88rem}
  tbody td{border-bottom:1px solid #eee}
  tbody tr:hover{background:#f0f7ff}
</style></head>
<body>
<h1>Lighthouse Performance Report</h1>
<p class="meta"><strong>${currentUrl}</strong> &nbsp;·&nbsp; ${deviceLabel} &nbsp;·&nbsp; ${new Date().toLocaleString()} &nbsp;·&nbsp; ${resultsData.length} runs</p>
<table><thead><tr>${thHtml}</tr></thead><tbody>${tbodyHtml}</tbody></table>
</body></html>`;
      downloadBlob(html, 'text/html;charset=utf-8;', getFilename('html'));
    }

    function exportXlsx() {
      const { headers, rows } = getTableRows();
      const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);

      // Column widths
      ws['!cols'] = [6, 8, 10, 10, 10, 8, 12, 10].map(w => ({ wch: w }));

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Results');
      XLSX.writeFile(wb, getFilename('xlsx'));
    }

    // ── Run ───────────────────────────────────────────────────────────

    function startRun() {
      const url = document.getElementById('urlInput').value.trim();
      const device = document.querySelector('input[name="device"]:checked').value;
      const runs = parseInt(document.getElementById('runsSelect').value, 10);

      if (!url) { showError('Please enter a URL.'); return; }

      hideError();

      currentUrl = url;
      currentDevice = device;
      resultsData = [];
      avgData = null;

      // Reset UI
      document.getElementById('tableBody').innerHTML = '';
      document.getElementById('resultsWrap').classList.remove('visible');
      document.getElementById('exportRow').classList.remove('visible');
      document.getElementById('progressWrap').classList.add('visible');
      document.getElementById('progressBar').style.width = '0%';
      document.getElementById('progressLabel').textContent = 'Starting...';
      document.getElementById('progressCount').textContent = '';
      document.getElementById('runBtn').disabled = true;

      const metaEl = document.getElementById('resultsMeta');
      metaEl.innerHTML = `<strong>${url}</strong> &nbsp;·&nbsp; ${device === 'mobile' ? '📱 Mobile' : '🖥 Desktop'} &nbsp;·&nbsp; ${new Date().toLocaleString()}`;

      const evtSource = new EventSource(`/run?url=${encodeURIComponent(url)}&device=${device}&runs=${runs}`);

      evtSource.addEventListener('progress', e => {
        const data = JSON.parse(e.data);
        const { run, total, status } = data;
        const pct = status === 'done' ? Math.round((run / total) * 100) : Math.round(((run - 1) / total) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressLabel').textContent = status === 'running'
          ? `Running audit ${run} of ${total}...`
          : `Completed ${run} of ${total}`;
        document.getElementById('progressCount').textContent = `${run} / ${total}`;

        if (status === 'done') {
          resultsData.push(data.result);
          document.getElementById('resultsWrap').classList.add('visible');
          document.getElementById('tableBody').appendChild(makeRow(run, data.result));
        }
      });

      evtSource.addEventListener('done', e => {
        const { avg } = JSON.parse(e.data);
        avgData = avg;
        document.getElementById('tableBody').appendChild(makeRow(null, avg, true));
        document.getElementById('progressBar').style.width = '100%';
        document.getElementById('progressLabel').textContent = 'Done!';
        document.getElementById('exportRow').classList.add('visible');
        document.getElementById('runBtn').disabled = false;
        evtSource.close();
      });

      evtSource.addEventListener('error', e => {
        try {
          const { message } = JSON.parse(e.data);
          showError(message);
        } catch {
          showError('An unexpected error occurred.');
        }
        document.getElementById('progressWrap').classList.remove('visible');
        document.getElementById('runBtn').disabled = false;
        evtSource.close();
      });
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') startRun();
    });
  </script>
</body>
</html>
